<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Happy Birthday 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --card-w: min(92vw, 580px);
          --env-w: min(80vw, 340px);
          --env-h: calc(var(--env-w) * 0.706);
          --title-size: clamp(36px, 10vw, 64px);
          --subtitle-size: clamp(14px, 4vw, 22px);
          --body-size: clamp(13px, 3.5vw, 16px);
          --tag-size: clamp(9px, 2.2vw, 11px);
          --pad-x: clamp(20px, 6vw, 40px);
          --pad-y: clamp(28px, 6vw, 44px);
        }

        html, body {
          width: 100%;
          height: 100%;
        }
      
        body {
          min-height: 100vh;
          min-height: 100dvh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: radial-gradient(ellipse at center, #1a0a0f 0%, #0a0a0a 100%);
          font-family: 'Lato', sans-serif;
          overflow-x: hidden;
          -webkit-tap-highlight-color: transparent;
        }

        /* ── ENVELOPE SCENE ── */
        #envelope-scene {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 100;
          cursor: pointer;
          touch-action: manipulation;
        }

        .env-wrap {
          position: relative;
          width: var(--env-w);
          height: var(--env-h);
          filter: drop-shadow(0 20px 60px rgba(0,0,0,0.8));
          animation: envFloat 3s ease-in-out infinite;
        }
        @keyframes envFloat {
          0%,100% { transform: translateY(0); }
          50%      { transform: translateY(-10px); }
        }

        .env-body {
          position: absolute;
          inset: 0;
          background: linear-gradient(160deg, #7b1e3a 0%, #3d0d1a 100%);
          border-radius: 6px 6px 14px 14px;
          overflow: hidden;
        }
        .env-body::after {
          content: '';
          position: absolute;
          bottom: 0; left: 0; right: 0;
          height: 55%;
          background: linear-gradient(to top, #2a0910, transparent);
        }

        .env-left, .env-right {
          position: absolute;
          bottom: 0;
          width: 0; height: 0;
          border-style: solid;
        }
        .env-left {
          left: 0;
          border-width: 0 0 calc(var(--env-h) * 0.55) calc(var(--env-w) * 0.5);
          border-color: transparent transparent #4a1125 transparent;
        }
        .env-right {
          right: 0;
          border-width: 0 calc(var(--env-w) * 0.5) calc(var(--env-h) * 0.55) 0;
          border-color: transparent #4a1125 transparent transparent;
        }

        .env-bottom {
          position: absolute;
          bottom: 0; left: 0; right: 0;
          height: 55%;
          background: linear-gradient(to top, #5c1530, #3d0d1a);
          clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        .env-flap {
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 55%;
          background: linear-gradient(to bottom, #8b2244, #5c1530);
          clip-path: polygon(0% 0%, 50% 100%, 100% 0%);
          transform-origin: top center;
          transform-style: preserve-3d;
          transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
          z-index: 5;
        }
        .env-flap.open { transform: rotateX(-180deg); }

        .env-seal {
          position: absolute;
          top: 50%; left: 50%;
          transform: translate(-50%, -50%);
          font-size: clamp(24px, 8vw, 32px);
          z-index: 10;
          transition: opacity 0.3s, transform 0.3s;
          filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
        }
        .env-seal.hidden { opacity: 0; transform: translate(-50%, -50%) scale(0); }

        .click-hint {
          position: absolute;
          bottom: clamp(-50px, -6vw, -38px);
          left: 50%;
          transform: translateX(-50%);
          color: rgba(255,200,180,0.6);
          font-size: clamp(10px, 2.5vw, 13px);
          letter-spacing: 0.15em;
          text-transform: uppercase;
          white-space: nowrap;
          animation: blink 1.8s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }

        .env-card-peek {
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
          width: calc(var(--env-w) * 0.82);
          height: calc(var(--env-h) * 1.6);
          background: #1a0a0f;
          border-radius: 12px;
          bottom: 20px;
          z-index: 3;
          transition: bottom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s;
          overflow: hidden;
        }
        .env-card-peek.rising {
          bottom: calc(var(--env-h) * 0.65);
        }

        #envelope-scene.exit {
          animation: sceneExit 0.6s cubic-bezier(0.4,0,1,1) 0.3s both;
        }
        @keyframes sceneExit {
          to { opacity: 0; transform: scale(0.85); pointer-events: none; }
        }

        /* ── BIRTHDAY CARD ── */
        #card-scene {
          display: none;
          width: 100%;
          min-height: 100vh;
          min-height: 100dvh;
          align-items: flex-start;
          justify-content: center;
          padding: clamp(12px, 4vw, 24px) 0 clamp(24px, 6vw, 40px);
          overflow-y: auto;
        }
        #card-scene.visible {
          display: flex;
          animation: cardReveal 0.9s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes cardReveal {
          from { opacity: 0; transform: scale(0.92) translateY(30px); }
          to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card {
          position: relative;
          width: var(--card-w);
          border-radius: clamp(16px, 4vw, 28px);
          overflow: hidden;
          box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.08);
        }

        .card-bg {
          position: absolute;
          inset: 0;
          background-image: var(--photo);
          background-size: cover;
          background-position: center top;
          filter: brightness(0.55) saturate(1.1);
          transition: filter 0.4s;
        }

        .card-overlay {
          position: absolute;
          inset: 0;
          background: linear-gradient(
            to bottom,
            rgba(0,0,0,0.05) 0%,
            rgba(0,0,0,0.1) 38%,
            rgba(0,0,0,0.72) 62%,
            rgba(0,0,0,0.93) 100%
          );
        }

        .hearts {
          position: absolute;
          inset: 0;
          pointer-events: none;
          overflow: hidden;
        }
        .heart {
          position: absolute;
          bottom: -30px;
          opacity: 0;
          animation: floatUp linear infinite;
        }
        .heart:nth-child(1)  { left: 8%;  animation-duration: 6s;   animation-delay: 0s;   font-size: clamp(10px,3vw,14px); }
        .heart:nth-child(2)  { left: 22%; animation-duration: 8s;   animation-delay: 1.5s; font-size: clamp(14px,5vw,22px); }
        .heart:nth-child(3)  { left: 40%; animation-duration: 7s;   animation-delay: 3s;   font-size: clamp(11px,3.5vw,16px); }
        .heart:nth-child(4)  { left: 58%; animation-duration: 9s;   animation-delay: 0.8s; font-size: clamp(13px,4vw,20px); }
        .heart:nth-child(5)  { left: 75%; animation-duration: 6.5s; animation-delay: 2s;   font-size: clamp(9px,2.5vw,12px); }
        .heart:nth-child(6)  { left: 88%; animation-duration: 7.5s; animation-delay: 4s;   font-size: clamp(11px,3.5vw,18px); }
        .heart:nth-child(7)  { left: 50%; animation-duration: 5.5s; animation-delay: 5s;   font-size: clamp(15px,5vw,24px); }

        @keyframes floatUp {
          0%   { transform: translateY(0) rotate(-10deg); opacity: 0; }
          10%  { opacity: 0.7; }
          90%  { opacity: 0.4; }
          100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
        }

        .card-content {
          position: relative;
          z-index: 2;
          padding: var(--pad-y) var(--pad-x) calc(var(--pad-y) * 1.1);
          display: flex;
          flex-direction: column;
          /* tall enough to show photo + content */
          min-height: clamp(520px, 145vw, 820px);
        }

        .tag {
          align-self: flex-start;
          font-size: var(--tag-size);
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: rgba(255,200,180,0.75);
          border: 1px solid rgba(255,200,180,0.3);
          border-radius: 20px;
          padding: 4px 14px;
          backdrop-filter: blur(4px);
        }

        .spacer { flex: 1; }

        .title {
          font-family: 'Playfair Display', serif;
          font-weight: 700;
          font-size: var(--title-size);
          line-height: 1.0;
          color: #fff;
          text-shadow: 0 2px 20px rgba(0,0,0,0.6);
          margin-bottom: 3px;
        }

        .subtitle {
          font-family: 'Playfair Display', serif;
          font-style: italic;
          font-weight: 400;
          font-size: var(--subtitle-size);
          color: rgba(255, 210, 190, 0.9);
          margin-bottom: clamp(18px, 5vw, 32px);
        }

        .message-label {
          font-size: clamp(9px, 2vw, 10px);
          letter-spacing: 0.18em;
          text-transform: uppercase;
          color: rgba(255,200,180,0.5);
          margin-bottom: 8px;
        }

        .message-box {
          width: 100%;
          min-height: clamp(130px, 35vw, 180px);
          background: rgba(255,255,255,0.06);
          border: 1px solid rgba(255,255,255,0.15);
          border-radius: clamp(10px, 3vw, 16px);
          padding: clamp(12px, 3.5vw, 18px) clamp(14px, 4vw, 20px);
          color: #fff;
          font-family: 'Lato', sans-serif;
          font-size: var(--body-size);
          line-height: 1.7;
          font-weight: 300;
          resize: vertical;
          outline: none;
          backdrop-filter: blur(8px);
          transition: border-color 0.25s, background 0.25s;
          -webkit-appearance: none;
        }
        .message-box:focus {
          border-color: rgba(255, 160, 130, 0.6);
          background: rgba(255,255,255,0.1);
        }

        .footer-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-top: clamp(14px, 4vw, 20px);
        }

        .date {
          font-size: clamp(9px, 2.5vw, 11px);
          letter-spacing: 0.12em;
          color: rgba(255,255,255,0.3);
        }

        .seal {
          font-size: clamp(18px, 5vw, 26px);
          animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

<!-- ENVELOPE SCENE -->
<div id="envelope-scene" onclick="openEnvelope()">
    <div class="env-wrap">
        <div class="env-card-peek" id="env-peek"></div>
        <div class="env-body">
            <div class="env-left"></div>
            <div class="env-right"></div>
            <div class="env-bottom"></div>
        </div>
        <div class="env-flap" id="env-flap"></div>
        <div class="env-seal" id="env-seal">💝</div>
        <div class="click-hint">tap to open</div>
    </div>
</div>

                        Happy birthday my BABY GIRL! Edit: thank you for treating me when im sick and sorry that things didnt go as planned, i had plan b's but not any plan b if i got sick 🙁 But thank you for staying with me and being by my side always, especially when im sick 🥰😷. The date didnt go as planned but I thank you for not getting mad at me. Edit: You got mad at me, but thats my fault for having a miscommunication between us. I'm sorry about that. But thank you for giving me a chance today on your birthday to try to make up for what was lost yesterday. Note that this is not the end and we will have a part 2 for your birthday, so we can continue the original plan.
                        Buttt!! Its now your 26th birthday, you are now closer to 30 than I am hehe. Its been almost 3 yrs of officially being together almost 4 yrs of just being together, and being with you never bores me. Even if we just hang out the house, do chores, or do our own things. Even if we've been together for long, we learn to get new hobbies for us, like bouldering, hiking(all of this are from u), and i know we will find more stuffs to do together haha. I recently tried reading/listening to books and I enjoyed it, maybe a little too much. Who knows, maybe you'll enjoy playing MTG with me too 😉.
                        Currently I think, we are getting better and living together, there are just times where we have are lazy periods but we always bounce back! I know you want to leave this place, but maybe we should wait until I get a new job to make the financial weight on you lighter. Even if we stay here for another year and just focus spending on our luho. Its gonna be a big step for us living in Manila, i know its what you want but I dont feel good leaving "home" or being too far away from it. But for you I'd give it a try because thats how much I love you. I really want to get a new job so I can spoil you and do the things that you want to do, basically mskasabay sa mga bet mo haha. Since you have higher salary than me, you can afford more things than me. I want to even the playing field, or better, turn the tables hahaha. If I get a new job that doubles my salary, we gon eat great everyday!!!
                        I know I dont tell you as often as before that you look pretty and cute. But there times that you make me gigil, and i just kiss you suddenly or hug you suddenly. It just gets stuck on my head and I forget to tell you. When You are having zoomies like char, I find that super cute. Or when you wake up with a bed hair, i find it cute too. Sometimes hot even. In my eyes you didn't get ugly or less pretty like you say, its just me skipping to the actions I want to do to you and not saying that you are pretty too. Because you are pretty! People who dont think that youre pretty are stupid. If you dont think ur pretty, u stoopid too 😡.
                        I know you ask me a lot to tell you why I love you. Well while writing this message, I can tell you that I love you because of you complete me. I'm not a great all aroung guy, I do struggle a lot from other stuffs, but you'd teach me how to do things. Like, arguing, how to dress properly, how properly clean the house. On the places I lack, you fill me in (like I fill u up 😉), you'd pour your water to fill my cup so I can be better for you, for us. Also being with you everyday with you feels great, even if you have office, I know you will come home and we can cuddle. But in the days that I'm not with you it feels lonely. You'd ask if I missed you but I dont know what to say because I feel lonely without you and also I dont miss you because I know you'll comeback in a bit, it's just paradoxical hahaha. But I do get lonely when I'm not with you here at our home, there's always that feeling that I am all alone. Now, I have a new fear, living at our home without you. SO DONT YOU DARE LEAVE ME!!!
                        Also, I remembered your question  earlier, thought I'd forget huh, "if you would meet me now, what would you like about me?". Well, I'd like that you are mature now and know how to handle yourself on front of other people. But I think I'd love how you are so eager to explore things you dont know. That's what I initially thought because from my perspective, I'm a new friend of yours, so I thought because of you are so eager to explore things, I'd want you to explore a relationship with me, a new guy HAHAAHA, even if I'm pretending to be someone else or a new guy, I'd still want you to be mine HAHAHA.
                        Lastly, I just want to be grateful to you. You were just a dream that I once knew, I never thought I would be right for you. You're the best thing I never knew I needed. Well, we both know those are lyrics from songs, but there are no other words that would describe how I feel, from the beginning of our relationship til now. Happy happy birthday my baby girl. I hope we will spend more and more birthdays in the future. I LOVEEE YOUUU !!! 🤍💗🤍💗🤍💗

<script>
    const d = new Date();
    document.getElementById('bday-date').textContent =

    function openEnvelope() {
      const scene = document.getElementById('envelope-scene');
      const flap  = document.getElementById('env-flap');
      const seal  = document.getElementById('env-seal');
      const peek  = document.getElementById('env-peek');
      const card  = document.getElementById('card-scene');

      scene.onclick = null;

      seal.classList.add('hidden');
      setTimeout(() => flap.classList.add('open'), 150);
      setTimeout(() => peek.classList.add('rising'), 600);
      setTimeout(() => scene.classList.add('exit'), 1100);
      setTimeout(() => {
        scene.style.display = 'none';
        card.classList.add('visible');
        // Scroll to top after reveal
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 1700);
    }
</script>
